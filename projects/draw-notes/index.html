<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DrawNotes - Fast Drawing Notes</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0d1117;
            color: #c9d1d9;
            overflow: hidden;
        }
        #app { display: flex; height: 100vh; }
        
        /* Sidebar - Graph View */
        #sidebar {
            width: 280px;
            background: #161b22;
            border-right: 1px solid #30363d;
            display: flex;
            flex-direction: column;
        }
        #sidebar-header {
            padding: 16px;
            border-bottom: 1px solid #30363d;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        #sidebar-header h1 { font-size: 14px; font-weight: 600; }
        #new-btn {
            background: #238636;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 500;
        }
        #new-btn:hover { background: #2ea043; }
        #graph-view {
            flex: 1;
            overflow: auto;
            padding: 12px;
        }
        .node {
            background: #21262d;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: all 0.15s ease;
        }
        .node:hover { background: #30363d; border-color: #58a6ff; }
        .node.active { background: #1f6feb; border-color: #58a6ff; }
        .node-thumbnail {
            width: 100%;
            height: 120px;
            background: #0d1117;
            border-radius: 4px;
            margin-bottom: 8px;
            overflow: hidden;
        }
        .node-thumbnail img { width: 100%; height: 100%; object-fit: cover; }
        .node-title {
            font-size: 12px;
            font-weight: 500;
            color: #e6edf3;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .node-time {
            font-size: 10px;
            color: #8b949e;
            margin-top: 4px;
        }
        
        /* Main Editor */
        #editor {
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        #toolbar {
            padding: 12px 16px;
            background: #161b22;
            border-bottom: 1px solid #30363d;
            display: flex;
            gap: 12px;
            align-items: center;
        }
        .tool-group {
            display: flex;
            gap: 4px;
            padding-right: 12px;
            border-right: 1px solid #30363d;
        }
        .tool-group:last-child { border-right: none; }
        .tool-btn {
            background: #21262d;
            border: 1px solid #30363d;
            color: #c9d1d9;
            padding: 6px 10px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
        }
        .tool-btn:hover { background: #30363d; }
        .tool-btn.active { background: #1f6feb; border-color: #58a6ff; }
        .color-btn {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            border: 2px solid transparent;
            cursor: pointer;
        }
        .color-btn.active { border-color: white; }
        #stroke-slider {
            width: 80px;
        }
        
        /* Canvas Container */
        #canvas-container {
            flex: 1;
            position: relative;
            background: #0d1117;
            overflow: hidden;
        }
        #drawing-canvas {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #ffffff;
            cursor: crosshair;
            box-shadow: 0 0 40px rgba(0,0,0,0.5);
        }
        
        /* Quick Text Input */
        #text-input {
            position: absolute;
            background: white;
            border: 2px solid #1f6feb;
            padding: 4px 8px;
            font-size: 14px;
            outline: none;
            display: none;
            z-index: 100;
        }
    </style>
</head>
<body>
    <div id="app">
        <aside id="sidebar">
            <div id="sidebar-header">
                <h1>DrawNotes</h1>
                <button id="new-btn">+ New</button>
            </div>
            <div id="graph-view"></div>
        </aside>
        
        <main id="editor">
            <div id="toolbar">
                <div class="tool-group">
                    <button class="tool-btn active" data-tool="pen">Pen</button>
                    <button class="tool-btn" data-tool="eraser">Eraser</button>
                    <button class="tool-btn" data-tool="text">Text</button>
                </div>
                <div class="tool-group">
                    <div class="color-btn active" style="background: #000000" data-color="#000000"></div>
                    <div class="color-btn" style="background: #ff0000" data-color="#ff0000"></div>
                    <div class="color-btn" style="background: #00ff00" data-color="#00ff00"></div>
                    <div class="color-btn" style="background: #0000ff" data-color="#0000ff"></div>
                    <div class="color-btn" style="background: #ffff00" data-color="#ffff00"></div>
                </div>
                <div class="tool-group">
                    <input type="range" id="stroke-slider" min="1" max="20" value="3">
                    <span id="stroke-label" style="font-size: 11px; color: #8b949e;">3px</span>
                </div>
                <div class="tool-group">
                    <button class="tool-btn" id="clear-btn">Clear</button>
                    <button class="tool-btn" id="delete-btn">Delete</button>
                </div>
            </div>
            <div id="canvas-container">
                <canvas id="drawing-canvas" width="1200" height="800"></canvas>
                <input type="text" id="text-input" placeholder="Type here...">
            </div>
        </main>
    </div>
    
    <script>
        // State
        const state = {
            notes: [],
            currentNoteId: null,
            tool: 'pen',
            color: '#000000',
            strokeWidth: 3,
            isDrawing: false,
            lastX: 0,
            lastY: 0
        };
        
        // Load from localStorage
        function loadNotes() {
            const saved = localStorage.getItem('drawnotes');
            if (saved) {
                state.notes = JSON.parse(saved);
            }
            renderGraph();
            if (state.notes.length > 0) {
                loadNote(state.notes[0].id);
            } else {
                createNote();
            }
        }
        
        // Save to localStorage
        function saveNotes() {
            localStorage.setItem('drawnotes', JSON.stringify(state.notes));
        }
        
        // Create new note
        function createNote() {
            const note = {
                id: Date.now().toString(),
                title: `Note ${state.notes.length + 1}`,
                created: Date.now(),
                modified: Date.now(),
                data: null // Will store canvas data URL
            };
            state.notes.unshift(note);
            saveNotes();
            renderGraph();
            loadNote(note.id);
            return note;
        }
        
        // Load note into canvas
        function loadNote(id) {
            const note = state.notes.find(n => n.id === id);
            if (!note) return;
            
            state.currentNoteId = id;
            
            // Clear canvas
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Load image if exists
            if (note.data) {
                const img = new Image();
                img.onload = () => ctx.drawImage(img, 0, 0);
                img.src = note.data;
            }
            
            renderGraph();
        }
        
        // Save current note
        function saveCurrentNote() {
            if (!state.currentNoteId) return;
            
            const note = state.notes.find(n => n.id === state.currentNoteId);
            if (note) {
                note.data = canvas.toDataURL('image/png');
                note.modified = Date.now();
                saveNotes();
                renderGraph();
            }
        }
        
        // Delete current note
        function deleteCurrentNote() {
            if (!state.currentNoteId) return;
            if (!confirm('Delete this note?')) return;
            
            state.notes = state.notes.filter(n => n.id !== state.currentNoteId);
            saveNotes();
            
            if (state.notes.length > 0) {
                loadNote(state.notes[0].id);
            } else {
                createNote();
            }
        }
        
        // Render graph view
        function renderGraph() {
            const container = document.getElementById('graph-view');
            container.innerHTML = '';
            
            state.notes.forEach(note => {
                const node = document.createElement('div');
                node.className = 'node' + (note.id === state.currentNoteId ? ' active' : '');
                node.innerHTML = `
                    <div class="node-thumbnail">
                        ${note.data ? `<img src="${note.data}" alt="">` : ''}
                    </div>
                    <div class="node-title">${note.title}</div>
                    <div class="node-time">${new Date(note.modified).toLocaleString()}</div>
                `;
                node.onclick = () => {
                    saveCurrentNote();
                    loadNote(note.id);
                };
                container.appendChild(node);
            });
        }
        
        // Canvas setup
        const canvas = document.getElementById('drawing-canvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        const textInput = document.getElementById('text-input');
        
        // Initialize canvas with white background
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        
        // Drawing functions
        function getPos(e) {
            const rect = canvas.getBoundingClientRect();
            return {
                x: e.clientX - rect.left,
                y: e.clientY - rect.top
            };
        }
        
        function startDrawing(e) {
            if (state.tool === 'text') {
                const pos = getPos(e);
                textInput.style.left = (canvas.offsetLeft + pos.x) + 'px';
                textInput.style.top = (canvas.offsetTop + pos.y) + 'px';
                textInput.style.display = 'block';
                textInput.focus();
                textInput.dataset.x = pos.x;
                textInput.dataset.y = pos.y;
                return;
            }
            
            state.isDrawing = true;
            const pos = getPos(e);
            state.lastX = pos.x;
            state.lastY = pos.y;
        }
        
        function draw(e) {
            if (!state.isDrawing) return;
            
            const pos = getPos(e);
            ctx.beginPath();
            ctx.moveTo(state.lastX, state.lastY);
            ctx.lineTo(pos.x, pos.y);
            
            if (state.tool === 'eraser') {
                ctx.globalCompositeOperation = 'destination-out';
                ctx.lineWidth = state.strokeWidth * 3;
            } else {
                ctx.globalCompositeOperation = 'source-over';
                ctx.strokeStyle = state.color;
                ctx.lineWidth = state.strokeWidth;
            }
            
            ctx.stroke();
            state.lastX = pos.x;
            state.lastY = pos.y;
        }
        
        function stopDrawing() {
            if (state.isDrawing) {
                state.isDrawing = false;
                saveCurrentNote();
            }
        }
        
        // Event listeners - Mouse
        canvas.addEventListener('mousedown', startDrawing);
        canvas.addEventListener('mousemove', draw);
        canvas.addEventListener('mouseup', stopDrawing);
        canvas.addEventListener('mouseout', stopDrawing);
        
        // Event listeners - Touch (for tablets)
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            const mouseEvent = new MouseEvent('mousedown', {
                clientX: touch.clientX,
                clientY: touch.clientY
            });
            canvas.dispatchEvent(mouseEvent);
        });
        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            const mouseEvent = new MouseEvent('mousemove', {
                clientX: touch.clientX,
                clientY: touch.clientY
            });
            canvas.dispatchEvent(mouseEvent);
        });
        canvas.addEventListener('touchend', () => {
            const mouseEvent = new MouseEvent('mouseup', {});
            canvas.dispatchEvent(mouseEvent);
        });
        
        // Text input handler
        textInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                const x = parseFloat(textInput.dataset.x);
                const y = parseFloat(textInput.dataset.y);
                ctx.font = `${state.strokeWidth * 5 + 10}px sans-serif`;
                ctx.fillStyle = state.color;
                ctx.fillText(textInput.value, x, y + 20);
                textInput.value = '';
                textInput.style.display = 'none';
                saveCurrentNote();
            } else if (e.key === 'Escape') {
                textInput.value = '';
                textInput.style.display = 'none';
            }
        });
        
        // Toolbar handlers
        document.querySelectorAll('.tool-btn[data-tool]').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.tool-btn[data-tool]').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                state.tool = btn.dataset.tool;
                canvas.style.cursor = state.tool === 'text' ? 'text' : 'crosshair';
            });
        });
        
        document.querySelectorAll('.color-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                state.color = btn.dataset.color;
                state.tool = 'pen';
                document.querySelectorAll('.tool-btn[data-tool]').forEach(b => b.classList.remove('active'));
                document.querySelector('[data-tool="pen"]').classList.add('active');
            });
        });
        
        const strokeSlider = document.getElementById('stroke-slider');
        const strokeLabel = document.getElementById('stroke-label');
        strokeSlider.addEventListener('input', () => {
            state.strokeWidth = parseInt(strokeSlider.value);
            strokeLabel.textContent = state.strokeWidth + 'px';
        });
        
        document.getElementById('clear-btn').addEventListener('click', () => {
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            saveCurrentNote();
        });
        
        document.getElementById('delete-btn').addEventListener('click', deleteCurrentNote);
        document.getElementById('new-btn').addEventListener('click', createNote);
        
        // Auto-save on window blur
        window.addEventListener('blur', saveCurrentNote);
        
        // Initialize
        loadNotes();
    </script>
</body>
</html>
