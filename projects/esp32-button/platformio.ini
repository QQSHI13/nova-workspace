[env:m5capsule]
platform = espressif32
board = m5stack-stamps3
framework = arduino
monitor_speed = 115200
upload_speed = 1500000
build_flags = 
    -DCORE_DEBUG_LEVEL=3
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DBOARD_HAS_PSRAM
    -Wno-cpp
lib_deps = 
    m5stack/M5Unified
    m5stack/M5Capsule
    fastled/FastLED
    tanakamasayuki/I2C BM8563 RTC
