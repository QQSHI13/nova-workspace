<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="Simple fullscreen clock display">
    <meta name="theme-color" content="#111213">
    <title>Time</title>

    <style>
        .blank {
            display: inline-block;
            box-sizing: content-box;
            cursor: normal;
            padding: 5% 10%;
            border: 1px solid #69696962;
            border-radius: 50px;
            font: normal 1500%/normal Arial, Helvetica, sans-serif;
            color: rgba(255, 255, 255, 0.9);
            text-indent: 1px;
            text-overflow: clip;
            letter-spacing: 1px;
            word-spacing: 24px;
            background: rgba(96, 96, 96, 0.36);
            box-shadow: 7px 7px 11px 0 rgba(0, 0, 0, 0.46);
            text-shadow: 5px 5px 11px rgba(0, 0, 0, 0.64);
            transition: all 300ms cubic-bezier(0.42, 0, 0.58, 1);
        }
        
        .icon_blank {
            display: inline-block;
            box-sizing: content-box;
            cursor: normal;
            padding: 1% 5%;
            border: 1px solid #69696962;
            border-radius: 50px;
            font: normal 200%/normal Arial, Helvetica, sans-serif;
            color: rgba(255, 255, 255, 0.9);
            text-indent: 1px;
            text-overflow: clip;
            letter-spacing: 1px;
            word-spacing: 24px;
            background: rgba(96, 96, 96, 0.36);
            box-shadow: 7px 7px 11px 0 rgba(0, 0, 0, 0.46);
            text-shadow: 5px 5px 11px rgba(0, 0, 0, 0.64);
            transition: all 300ms cubic-bezier(0.42, 0, 0.58, 1);
        }
        
        body, html {
            height: 100%;
            margin: 0;
            padding: 0;
        }
        
        body {
            background-color: rgb(17, 18, 19);
            font: normal;
            color: rgb(255, 255, 255);
            z-index: -1000;
            min-height: 100vh;
            position: relative;
        }
        
        #time {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
        }
        
        #tim {
            overflow-y: auto;
            overflow-x: hidden;
        }
    </style>
</head>

<body id="tim">
    <div class="blank" id="time"></div>

    <script>
        // Clock interval reference for cleanup
        let clockInterval;
        
        function updateTime() {
            const date = new Date();
            const hour = String(date.getHours()).padStart(2, '0');
            const minutes = String(date.getMinutes()).padStart(2, '0');
            const timeElement = document.getElementById('time');
            if (timeElement) {
                timeElement.textContent = hour + ':' + minutes;
            }
        }
        
        // Initialize clock
        updateTime();
        clockInterval = setInterval(updateTime, 1000);
        
        // Clear interval when page is hidden to prevent memory leak
        document.addEventListener('visibilitychange', () => {
            if (document.hidden) {
                if (clockInterval) {
                    clearInterval(clockInterval);
                    clockInterval = null;
                }
            } else {
                updateTime();
                clockInterval = setInterval(updateTime, 1000);
            }
        });
    </script>
    
    <!-- Service Worker Registration -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/flow/sw.js')
                    .then(registration => {
                        console.log('SW registered:', registration);
                        
                        // Auto-refresh when a new service worker takes control
                        navigator.serviceWorker.addEventListener('controllerchange', () => {
                            console.log('New service worker activated - reloading page');
                            window.location.reload();
                        });
                    })
                    .catch(error => {
                        console.log('SW registration failed:', error);
                    });
            });
        }
    </script>
</body>
</html>
