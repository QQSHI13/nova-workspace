<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSV ↔ JSON Converter</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            padding: 20px;
            color: #e0e0e0;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
            color: #fff;
            font-size: 2.5rem;
        }

        .converter-box {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        @media (max-width: 768px) {
            .converter-box {
                grid-template-columns: 1fr;
            }
            .arrow-container {
                transform: rotate(90deg);
            }
        }

        .panel {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .panel-title {
            font-size: 1.2rem;
            color: #fff;
            font-weight: 600;
        }

        .panel-actions {
            display: flex;
            gap: 10px;
        }

        textarea {
            width: 100%;
            min-height: 400px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 15px;
            color: #e0e0e0;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 14px;
            resize: vertical;
            transition: border-color 0.3s;
        }

        textarea:focus {
            outline: none;
            border-color: #4a9eff;
        }

        textarea[aria-invalid="true"] {
            border-color: #ff4757;
        }

        .arrow-container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-primary {
            background: #4a9eff;
            color: #fff;
        }

        .btn-primary:hover:not(:disabled) {
            background: #3a8eef;
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: #e0e0e0;
        }

        .btn-secondary:hover:not(:disabled) {
            background: rgba(255, 255, 255, 0.2);
        }

        .btn-arrow {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            padding: 0;
            justify-content: center;
            font-size: 20px;
        }

        .options {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .options-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }

        .option {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .option label {
            cursor: pointer;
        }

        input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        select {
            padding: 8px 12px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 6px;
            color: #e0e0e0;
            cursor: pointer;
        }

        .file-input-wrapper {
            position: relative;
            overflow: hidden;
            display: inline-block;
        }

        .file-input-wrapper input[type=file] {
            position: absolute;
            left: -9999px;
        }

        .error-message {
            color: #ff4757;
            margin-top: 10px;
            padding: 10px;
            background: rgba(255, 71, 87, 0.1);
            border-radius: 6px;
            display: none;
        }

        .error-message.visible {
            display: block;
        }

        .warning-message {
            color: #ffa502;
            margin-top: 10px;
            padding: 10px;
            background: rgba(255, 165, 2, 0.1);
            border-radius: 6px;
            display: none;
        }

        .warning-message.visible {
            display: block;
        }

        .info-message {
            color: #2ed573;
            margin-top: 10px;
            padding: 10px;
            background: rgba(46, 213, 115, 0.1);
            border-radius: 6px;
            display: none;
        }

        .info-message.visible {
            display: block;
        }

        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            gap: 20px;
            z-index: 1000;
        }

        .loading-overlay.visible {
            display: flex;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top-color: #4a9eff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .stats {
            text-align: center;
            color: #888;
            font-size: 0.9rem;
            margin-top: 10px;
        }

        .json-preview {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 8px;
            padding: 15px;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 14px;
            overflow-x: auto;
            white-space: pre-wrap;
            word-wrap: break-word;
            max-height: 400px;
            overflow-y: auto;
        }

        .json-key {
            color: #9cdcfe;
        }

        .json-string {
            color: #ce9178;
        }

        .json-number {
            color: #b5cea8;
        }

        .json-boolean {
            color: #569cd6;
        }

        .json-null {
            color: #569cd6;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 CSV ↔ JSON Converter</h1>
        
        <div class="options">
            <div class="options-grid">
                <div class="option">
                    <input type="checkbox" id="headerRow" checked aria-label="Use first row as headers">
                    <label for="headerRow">Use first row as headers</label>
                </div>
                <div class="option">
                    <input type="checkbox" id="detectTypes" checked aria-label="Auto-detect data types">
                    <label for="detectTypes">Auto-detect data types</label>
                </div>
                <div class="option">
                    <label for="delimiter">Delimiter:</label>
                    <select id="delimiter" aria-label="CSV delimiter">
                        <option value="auto">Auto-detect</option>
                        <option value="," selected>Comma (,)</option>
                        <option value=";">Semicolon (;)</option>
                        <option value="\t">Tab</option>
                        <option value="|">Pipe (|)</option>
                    </select>
                </div>
                <div class="option">
                    <label for="quoteChar">Quote:</label>
                    <select id="quoteChar" aria-label="Quote character">
                        <option value='"' selected>Double Quote (")</option>
                        <option value="'">Single Quote (')</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="converter-box">
            <div class="panel">
                <div class="panel-header">
                    <span class="panel-title">CSV Input</span>
                    <div class="panel-actions">
                        <div class="file-input-wrapper">
                            <button class="btn btn-secondary" aria-label="Load CSV file">📁 Load File</button>
                            <input type="file" id="csvFileInput" accept=".csv,.txt" aria-label="Choose CSV file">
                        </div>
                        <button class="btn btn-secondary" id="clearCsv" aria-label="Clear CSV input">Clear</button>
                    </div>
                </div>
                <textarea id="csvInput" placeholder="Paste your CSV here...&#10;name,age,city&#10;John,30,New York&#10;Jane,25,Los Angeles" aria-label="CSV input"></textarea>
                <div id="csvError" class="error-message" role="alert" aria-live="polite"></div>
                <div id="csvWarning" class="warning-message" role="status" aria-live="polite"></div>
                <div class="stats" id="csvStats"></div>
            </div>

            <div class="arrow-container">
                <button class="btn btn-primary btn-arrow" id="csvToJson" title="CSV to JSON" aria-label="Convert CSV to JSON">→</button>
                <button class="btn btn-primary btn-arrow" id="jsonToCsv" title="JSON to CSV" aria-label="Convert JSON to CSV">←</button>
            </div>

            <div class="panel">
                <div class="panel-header">
                    <span class="panel-title">JSON Output</span>
                    <div class="panel-actions">
                        <button class="btn btn-secondary" id="copyJson" aria-label="Copy JSON to clipboard">📋 Copy</button>
                        <button class="btn btn-secondary" id="downloadJson" aria-label="Download JSON file">💾 Download</button>
                        <button class="btn btn-secondary" id="clearJson" aria-label="Clear JSON output">Clear</button>
                    </div>
                </div>
                <textarea id="jsonInput" placeholder="Paste your JSON here..." aria-label="JSON input/output"></textarea>
                <div id="jsonError" class="error-message" role="alert" aria-live="polite"></div>
                <div id="jsonInfo" class="info-message" role="status" aria-live="polite"></div>
                <div class="stats" id="jsonStats"></div>
            </div>
        </div>

        <div class="panel">
            <div class="panel-header">
                <span class="panel-title">Formatted Preview</span>
            </div>
            <div id="jsonPreview" class="json-preview" role="region" aria-label="JSON formatted preview"></div>
        </div>
    </div>

    <div class="loading-overlay" id="loadingOverlay" role="dialog" aria-label="Processing" aria-hidden="true">
        <div class="spinner"></div>
        <p>Processing large file...</p>
    </div>

    <script>
        // Constants
        const MAX_INPUT_SIZE = 10 * 1024 * 1024; // 10MB limit
        const LARGE_FILE_THRESHOLD = 100 * 1024; // 100KB threshold for loading state

        // DOM Elements
        const csvInput = document.getElementById('csvInput');
        const jsonInput = document.getElementById('jsonInput');
        const csvFileInput = document.getElementById('csvFileInput');
        const csvError = document.getElementById('csvError');
        const csvWarning = document.getElementById('csvWarning');
        const jsonError = document.getElementById('jsonError');
        const jsonInfo = document.getElementById('jsonInfo');
        const csvStats = document.getElementById('csvStats');
        const jsonStats = document.getElementById('jsonStats');
        const jsonPreview = document.getElementById('jsonPreview');
        const loadingOverlay = document.getElementById('loadingOverlay');

        // Options
        const headerRowCheckbox = document.getElementById('headerRow');
        const detectTypesCheckbox = document.getElementById('detectTypes');
        const delimiterSelect = document.getElementById('delimiter');
        const quoteCharSelect = document.getElementById('quoteChar');

        // Buttons
        document.getElementById('csvToJson').addEventListener('click', convertCsvToJson);
        document.getElementById('jsonToCsv').addEventListener('click', convertJsonToCsv);
        document.getElementById('clearCsv').addEventListener('click', () => {
            csvInput.value = '';
            clearMessages();
            updateStats();
        });
        document.getElementById('clearJson').addEventListener('click', () => {
            jsonInput.value = '';
            jsonPreview.innerHTML = '';
            clearMessages();
            updateStats();
        });
        document.getElementById('copyJson').addEventListener('click', copyToClipboard);
        document.getElementById('downloadJson').addEventListener('click', downloadJson);
        
        // File input wrapper button
        csvFileInput.parentElement.querySelector('button').addEventListener('click', () => {
            csvFileInput.click();
        });
        
        csvFileInput.addEventListener('change', handleFileUpload);

        // Utility: Escape HTML to prevent XSS
        function escapeHtml(text) {
            if (typeof text !== 'string') return text;
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Utility: Show loading state
        function showLoading(show) {
            loadingOverlay.classList.toggle('visible', show);
            loadingOverlay.setAttribute('aria-hidden', !show);
        }

        // Utility: Clear all messages
        function clearMessages() {
            csvError.textContent = '';
            csvError.classList.remove('visible');
            csvWarning.textContent = '';
            csvWarning.classList.remove('visible');
            jsonError.textContent = '';
            jsonError.classList.remove('visible');
            jsonInfo.textContent = '';
            jsonInfo.classList.remove('visible');
            csvInput.setAttribute('aria-invalid', 'false');
            jsonInput.setAttribute('aria-invalid', 'false');
        }

        // Utility: Show error message
        function showError(element, message) {
            element.textContent = message;
            element.classList.add('visible');
            if (element === csvError) csvInput.setAttribute('aria-invalid', 'true');
            if (element === jsonError) jsonInput.setAttribute('aria-invalid', 'true');
        }

        // Utility: Show warning message
        function showWarning(message) {
            csvWarning.textContent = message;
            csvWarning.classList.add('visible');
        }

        // Utility: Show info message
        function showInfo(message) {
            jsonInfo.textContent = message;
            jsonInfo.classList.add('visible');
        }

        // CRITICAL FIX 3: Proper CSV parser with escaped quote handling
        function parseCSV(text, delimiter = ',', quoteChar = '"') {
            const rows = [];
            let currentRow = [];
            let currentField = '';
            let i = 0;
            let inQuotes = false;
            
            const otherQuote = quoteChar === '"' ? "'" : '"';
            
            while (i < text.length) {
                const char = text[i];
                const nextChar = text[i + 1];
                
                if (!inQuotes) {
                    // Outside quotes
                    if (char === quoteChar) {
                        inQuotes = true;
                        i++;
                    } else if (char === delimiter) {
                        currentRow.push(currentField);
                        currentField = '';
                        i++;
                    } else if (char === '\n' || char === '\r') {
                        // Handle line endings (CR, LF, CRLF)
                        currentRow.push(currentField);
                        if (currentRow.length > 1 || currentRow[0] !== '' || rows.length > 0) {
                            rows.push(currentRow);
                        }
                        currentRow = [];
                        currentField = '';
                        // Skip CRLF
                        if (char === '\r' && nextChar === '\n') {
                            i += 2;
                        } else {
                            i++;
                        }
                    } else {
                        currentField += char;
                        i++;
                    }
                } else {
                    // Inside quotes
                    if (char === quoteChar) {
                        if (nextChar === quoteChar) {
                            // Escaped quote ("")
                            currentField += char;
                            i += 2;
                        } else {
                            // End of quoted field
                            inQuotes = false;
                            i++;
                        }
                    } else {
                        currentField += char;
                        i++;
                    }
                }
            }
            
            // Don't forget the last field/row
            currentRow.push(currentField);
            if (currentRow.length > 1 || currentRow[0] !== '') {
                rows.push(currentRow);
            }
            
            // Check for unclosed quotes
            if (inQuotes) {
                throw new Error('Unclosed quote in CSV data');
            }
            
            return rows;
        }

        // Auto-detect delimiter
        function detectDelimiter(text) {
            const delimiters = [',', ';', '\t', '|'];
            const counts = {};
            const firstLine = text.split('\n')[0] || '';
            
            delimiters.forEach(d => {
                counts[d] = (firstLine.match(new RegExp(d, 'g')) || []).length;
            });
            
            const detected = Object.entries(counts).sort((a, b) => b[1] - a[1])[0];
            return detected[1] > 0 ? detected[0] : ',';
        }

        // Strict number regex (only valid numeric formats)
        function parseValue(value, detectTypes) {
            if (!detectTypes) return value;
            
            const trimmed = value.trim();
            if (trimmed === '') return '';
            if (trimmed === 'null') return null;
            if (trimmed === 'true') return true;
            if (trimmed === 'false') return false;
            
            // Strict number regex: optional minus, digits, optional decimal part
            // No leading zeros allowed for integers (except 0 itself)
            if (/^-?(?:0|[1-9]\d*)(?:\.\d+)?(?:[eE][+-]?\d+)?$/.test(trimmed)) {
                const num = Number(trimmed);
                if (!isNaN(num) && isFinite(num)) {
                    return num;
                }
            }
            
            return value;
        }

        // Convert CSV to JSON
        function convertCsvToJson() {
            clearMessages();
            
            const csvText = csvInput.value.trim();
            if (!csvText) {
                showError(csvError, 'Please enter CSV data');
                return;
            }
            
            // Check size limit
            if (csvText.length > MAX_INPUT_SIZE) {
                showError(csvError, `Input exceeds maximum size of ${MAX_INPUT_SIZE / 1024 / 1024}MB`);
                return;
            }
            
            // Show loading for large files
            const isLargeFile = csvText.length > LARGE_FILE_THRESHOLD;
            if (isLargeFile) showLoading(true);
            
            // Use setTimeout to allow UI to update
            setTimeout(() => {
                try {
                    let delimiter = delimiterSelect.value;
                    if (delimiter === 'auto') {
                        delimiter = detectDelimiter(csvText);
                    }
                    
                    const quoteChar = quoteCharSelect.value;
                    const useHeader = headerRowCheckbox.checked;
                    const detectTypes = detectTypesCheckbox.checked;
                    
                    const rows = parseCSV(csvText, delimiter, quoteChar);
                    
                    if (rows.length === 0) {
                        showError(csvError, 'No valid data found');
                        if (isLargeFile) showLoading(false);
                        return;
                    }
                    
                    // Check for column count mismatch
                    const columnCounts = rows.map(row => row.length);
                    const uniqueCounts = [...new Set(columnCounts)];
                    if (uniqueCounts.length > 1) {
                        showWarning(`Warning: Inconsistent column counts detected (${uniqueCounts.join(', ')} columns found)`);
                    }
                    
                    let headers = [];
                    let dataStartIndex = 0;
                    
                    if (useHeader) {
                        headers = rows[0].map((h, i) => h.trim() || `Column${i + 1}`);
                        dataStartIndex = 1;
                    } else {
                        // Generate column names
                        const maxCols = Math.max(...columnCounts);
                        headers = Array.from({ length: maxCols }, (_, i) => `Column${i + 1}`);
                    }
                    
                    const result = [];
                    for (let i = dataStartIndex; i < rows.length; i++) {
                        const row = rows[i];
                        const obj = {};
                        headers.forEach((header, index) => {
                            obj[header] = parseValue(row[index] || '', detectTypes);
                        });
                        result.push(obj);
                    }
                    
                    const jsonText = JSON.stringify(result, null, 2);
                    jsonInput.value = jsonText;
                    
                    // CRITICAL FIX 1: Safe JSON preview rendering with XSS protection
                    updateJsonPreview(result);
                    
                    updateStats();
                    showInfo(`Converted ${result.length} rows to JSON`);
                    
                } catch (error) {
                    showError(csvError, 'Error: ' + error.message);
                } finally {
                    if (isLargeFile) showLoading(false);
                }
            }, 10);
        }

        // CRITICAL FIX 1: Safe JSON preview rendering using textContent (no innerHTML with user data)
        function updateJsonPreview(data) {
            // Clear previous content
            jsonPreview.innerHTML = '';
            
            // Build preview using safe DOM methods
            const previewData = Array.isArray(data) && data.length > 100 
                ? data.slice(0, 100).concat([{ '...': `${data.length - 100} more items` }])
                : data;
            
            const text = JSON.stringify(previewData, null, 2);
            
            // Simple syntax highlighting using safe text nodes
            // We manually build the HTML with escaped content
            let highlighted = '';
            let inString = false;
            let stringChar = '';
            let escaped = false;
            
            for (let i = 0; i < text.length; i++) {
                const char = text[i];
                
                if (escaped) {
                    highlighted += char;
                    escaped = false;
                    continue;
                }
                
                if (char === '\\') {
                    highlighted += char;
                    escaped = true;
                    continue;
                }
                
                if (!inString && (char === '"' || char === "'")) {
                    inString = true;
                    stringChar = char;
                    highlighted += char;
                } else if (inString && char === stringChar) {
                    inString = false;
                    highlighted += char;
                } else {
                    highlighted += char;
                }
            }
            
            // Use textContent for the actual content to prevent XSS
            // Then apply highlighting via span creation
            jsonPreview.textContent = text;
            
            // Re-apply with manual highlighting (safe approach)
            jsonPreview.innerHTML = syntaxHighlightJson(text);
        }

        // Safe JSON syntax highlighting
        function syntaxHighlightJson(json) {
            // First escape any HTML
            let safe = escapeHtml(json);
            
            // Then apply syntax highlighting to the escaped content
            // Keys (property names)
            safe = safe.replace(/"([^"]+)":/g, '<span class="json-key">"$1"</span>:');
            
            // String values (be careful to not match keys again)
            // This is a simplified approach - we match quoted strings after colons or brackets
            safe = safe.replace(/(:\s*)("(?:[^"\\]|\\.)*")/g, '$1<span class="json-string">$2</span>');
            
            // Numbers (strict matching)
            safe = safe.replace(/\b(-?(?:0|[1-9]\d*)(?:\.\d+)?(?:[eE][+-]?\d+)?)\b/g, '<span class="json-number">$1</span>');
            
            // Booleans and null
            safe = safe.replace(/\b(true|false)\b/g, '<span class="json-boolean">$1</span>');
            safe = safe.replace(/\bnull\b/g, '<span class="json-null">null</span>');
            
            return safe;
        }

        // Convert JSON to CSV
        function convertJsonToCsv() {
            clearMessages();
            
            const jsonText = jsonInput.value.trim();
            if (!jsonText) {
                showError(jsonError, 'Please enter JSON data');
                return;
            }
            
            // Check size limit
            if (jsonText.length > MAX_INPUT_SIZE) {
                showError(jsonError, `Input exceeds maximum size of ${MAX_INPUT_SIZE / 1024 / 1024}MB`);
                return;
            }
            
            const isLargeFile = jsonText.length > LARGE_FILE_THRESHOLD;
            if (isLargeFile) showLoading(true);
            
            setTimeout(() => {
                try {
                    let data = JSON.parse(jsonText);
                    
                    if (!Array.isArray(data)) {
                        if (typeof data === 'object' && data !== null) {
                            data = [data];
                        } else {
                            throw new Error('JSON must be an array of objects or a single object');
                        }
                    }
                    
                    if (data.length === 0) {
                        showError(jsonError, 'Empty array');
                        if (isLargeFile) showLoading(false);
                        return;
                    }
                    
                    const delimiter = delimiterSelect.value === 'auto' ? ',' : delimiterSelect.value;
                    const quoteChar = quoteCharSelect.value;
                    const useHeader = headerRowCheckbox.checked;
                    
                    // Get all unique keys
                    const keys = [...new Set(data.flatMap(Object.keys))];
                    
                    let csv = '';
                    
                    // Header row
                    if (useHeader) {
                        csv += keys.map(k => escapeCsvField(k, delimiter, quoteChar)).join(delimiter) + '\n';
                    }
                    
                    // Data rows
                    data.forEach(obj => {
                        const row = keys.map(key => {
                            const value = obj[key];
                            return escapeCsvField(
                                value === null || value === undefined ? '' : String(value),
                                delimiter,
                                quoteChar
                            );
                        });
                        csv += row.join(delimiter) + '\n';
                    });
                    
                    csvInput.value = csv;
                    updateStats();
                    showInfo(`Converted ${data.length} records to CSV`);
                    
                } catch (error) {
                    showError(jsonError, 'Invalid JSON: ' + error.message);
                } finally {
                    if (isLargeFile) showLoading(false);
                }
            }, 10);
        }

        // Escape CSV field
        function escapeCsvField(field, delimiter, quoteChar) {
            // Check if escaping is needed
            const needsEscape = field.includes(quoteChar) || 
                               field.includes(delimiter) || 
                               field.includes('\n') || 
                               field.includes('\r');
            
            if (!needsEscape) {
                return field;
            }
            
            // Double the quote characters
            const escaped = field.replace(new RegExp(quoteChar, 'g'), quoteChar + quoteChar);
            return quoteChar + escaped + quoteChar;
        }

        // CRITICAL FIX 2: Handle file upload with input reset
        function handleFileUpload(event) {
            const file = event.target.files[0];
            if (!file) return;
            
            // Check file size
            if (file.size > MAX_INPUT_SIZE) {
                showError(csvError, `File exceeds maximum size of ${MAX_INPUT_SIZE / 1024 / 1024}MB`);
                // CRITICAL FIX 2: Reset file input to allow re-selection
                csvFileInput.value = '';
                return;
            }
            
            const isLargeFile = file.size > LARGE_FILE_THRESHOLD;
            if (isLargeFile) showLoading(true);
            
            const reader = new FileReader();
            reader.onload = (e) => {
                csvInput.value = e.target.result;
                updateStats();
                showInfo(`Loaded file: ${file.name} (${formatBytes(file.size)})`);
                if (isLargeFile) showLoading(false);
            };
            reader.onerror = () => {
                showError(csvError, 'Error reading file');
                if (isLargeFile) showLoading(false);
            };
            reader.readAsText(file);
            
            // CRITICAL FIX 2: Reset file input to allow re-selection of the same file
            csvFileInput.value = '';
        }

        // Format bytes
        function formatBytes(bytes) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const sizes = ['Bytes', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }

        // Update statistics
        function updateStats() {
            const csvText = csvInput.value;
            const jsonText = jsonInput.value;
            
            if (csvText) {
                const lines = csvText.trim().split('\n').length;
                const chars = csvText.length;
                csvStats.textContent = `${lines} lines, ${chars} characters`;
            } else {
                csvStats.textContent = '';
            }
            
            if (jsonText) {
                try {
                    const parsed = JSON.parse(jsonText);
                    const items = Array.isArray(parsed) ? parsed.length : 1;
                    jsonStats.textContent = `${items} item${items !== 1 ? 's' : ''}, ${jsonText.length} characters`;
                } catch {
                    jsonStats.textContent = `${jsonText.length} characters (invalid JSON)`;
                }
            } else {
                jsonStats.textContent = '';
            }
        }

        // Copy to clipboard with error handling
        async function copyToClipboard() {
            clearMessages();
            const text = jsonInput.value;
            if (!text) {
                showError(jsonError, 'Nothing to copy');
                return;
            }
            
            try {
                await navigator.clipboard.writeText(text);
                showInfo('Copied to clipboard!');
            } catch (err) {
                // Fallback for browsers without clipboard API
                try {
                    const textarea = document.createElement('textarea');
                    textarea.value = text;
                    textarea.style.position = 'fixed';
                    textarea.style.opacity = '0';
                    document.body.appendChild(textarea);
                    textarea.select();
                    const success = document.execCommand('copy');
                    document.body.removeChild(textarea);
                    
                    if (success) {
                        showInfo('Copied to clipboard!');
                    } else {
                        showError(jsonError, 'Failed to copy to clipboard');
                    }
                } catch (fallbackErr) {
                    showError(jsonError, 'Clipboard access denied. Please copy manually.');
                }
            }
        }

        // Download JSON
        function downloadJson() {
            clearMessages();
            const text = jsonInput.value;
            if (!text) {
                showError(jsonError, 'Nothing to download');
                return;
            }
            
            try {
                // Validate JSON before download
                JSON.parse(text);
                
                const blob = new Blob([text], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'data.json';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
                showInfo('Download started!');
            } catch (error) {
                showError(jsonError, 'Invalid JSON, cannot download');
            }
        }

        // Input event listeners for stats
        csvInput.addEventListener('input', updateStats);
        jsonInput.addEventListener('input', updateStats);

        // Register service worker with stale-while-revalidate strategy
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('data:text/javascript;base64,' + btoa(`
                const CACHE_NAME = 'csv-json-v1';
                const urlsToCache = ['/', '/index.html'];
                
                self.addEventListener('install', event => {
                    event.waitUntil(
                        caches.open(CACHE_NAME)
                            .then(cache => cache.addAll(urlsToCache))
                    );
                    self.skipWaiting();
                });
                
                self.addEventListener('activate', event => {
                    event.waitUntil(self.clients.claim());
                });
                
                // CRITICAL FIX 4: Stale-while-revalidate cache strategy
                self.addEventListener('fetch', event => {
                    event.respondWith(
                        caches.open(CACHE_NAME).then(cache => {
                            return cache.match(event.request).then(cachedResponse => {
                                const fetchPromise = fetch(event.request).then(networkResponse => {
                                    // Update cache with fresh response
                                    if (networkResponse && networkResponse.status === 200) {
                                        cache.put(event.request, networkResponse.clone());
                                    }
                                    return networkResponse;
                                }).catch(() => {
                                    // Network failed, return cached if available
                                    return cachedResponse;
                                });
                                
                                // Return cached version immediately if available, then update
                                return cachedResponse || fetchPromise;
                            });
                        })
                    );
                });
            `)).catch(err => console.log('Service Worker registration failed:', err));
        }
    </script>
</body>
